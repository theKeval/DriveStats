name: Review router

# Agentic-workflow Phase 5 (v4): orchestrates the @seniorDev (Copilot code review) loop.
#
# CYCLE (one automatic pass, then human-gated):
#   agent PR done -> request Copilot review -> review submitted:
#     0 comments  -> mark PR "Ready for review" + ping human        (ready-for-human)
#     >0 comments -> ONE batched @copilot fix dispatch              (fix-dispatched)
#                    fix session done -> mark ready + ping human    (ready-for-human)
#   From ready-for-human, NO automatic re-review. If the human manually requests a
#   Copilot review and it lands with comments, the router re-enters the cycle
#   (fix dispatch -> ready-for-human again). Clean manual review -> ping only.
#
# States are labels; timestamps (label add time vs review submit time) make every
# trigger idempotent and cycle-safe. Merge -> Jira Done is handled by jira-sync.yml.
#
# TRIGGERS: coding-agent workflow_run (low latency; Copilot bots emit no normal
# webhook events, and reviewer-triggered runs are held for approval + carry
# head_branch=main) + 10-min schedule sweep (reliability) + manual dispatch.
#
# SWEEP ON/OFF: repo variable ROUTER_SWEEP.
#   pause:  gh variable set ROUTER_SWEEP -b off -R <repo>
#   resume: gh variable set ROUTER_SWEEP -b on  -R <repo>   (or delete the variable)
#   manual: gh workflow run review-router.yml -R <repo>     (runs even when paused)
# Master lives in agentic-workflow repo (github/workflows/review-router.yml).

on:
  workflow_run:
    workflows: ["Copilot cloud agent"]
    types: [completed]
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write
  actions: read

concurrency:
  group: review-router
  cancel-in-progress: false

env:
  REPO: ${{ github.repository }}
  GH_TOKEN: ${{ github.token }}
  AGENT_PAT: ${{ secrets.AGENT_PAT }}
  JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
  JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
  JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
  SLACK_WEBHOOK_SENIORDEV: ${{ secrets.SLACK_WEBHOOK_SENIORDEV }}

jobs:
  route:
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' || vars.ROUTER_SWEEP != 'off'
    steps:
      - name: Route all agent PRs through the review state machine
        run: |
          set -euo pipefail

          jira_comment() { # $1=key $2=text
            [ -z "$1" ] && return 0
            jq -n --arg t "$2" '{body:{type:"doc",version:1,content:[{type:"paragraph",content:[{type:"text",text:$t}]}]}}' \
            | curl -sf -u "$JIRA_EMAIL:$JIRA_API_TOKEN" -H "Content-Type: application/json" -X POST \
                "$JIRA_BASE_URL/rest/api/3/issue/$1/comment" -d @- > /dev/null
          }
          slack() {
            curl -sf -X POST -H "Content-Type: application/json" -d "$(jq -n --arg t "$1" '{text:$t}')" "$SLACK_WEBHOOK_SENIORDEV" > /dev/null
          }
          add_label() { gh api -X POST "/repos/$REPO/issues/$1/labels" -f "labels[]=$2" > /dev/null; }
          rm_label() { gh api -X DELETE "/repos/$REPO/issues/$1/labels/$2" > /dev/null 2>&1 || true; }
          label_time() { # $1=pr $2=label -> ISO time the label was LAST added ('' if never)
            gh api --paginate "/repos/$REPO/issues/$1/timeline" \
              --jq "[.[] | select(.event==\"labeled\" and .label.name==\"$2\")] | last | .created_at // empty" 2>/dev/null \
              | grep -v '^$' | tail -1 || true
          }
          request_review() { # $1=pr
            curl -sf -H "Authorization: Bearer $AGENT_PAT" -H "Accept: application/vnd.github+json" \
              -X POST "https://api.github.com/repos/$REPO/pulls/$1/requested_reviewers" \
              -d '{"reviewers":["copilot-pull-request-reviewer[bot]"]}' > /dev/null
          }
          mark_ready() { # $1=pr-node-id (only if draft)
            gh api graphql -H "Authorization: Bearer $AGENT_PAT" \
              -f query='mutation($id: ID!) { markPullRequestReadyForReview(input:{pullRequestId:$id}) { pullRequest { isDraft } } }' \
              -f id="$1" > /dev/null
          }
          dispatch_fix() { # $1=pr $2=key $3=count -> label + ONE batched @copilot comment
            add_label "$1" "fix-dispatched"
            curl -sf -H "Authorization: Bearer $AGENT_PAT" -H "Accept: application/vnd.github+json" \
              -X POST "https://api.github.com/repos/$REPO/issues/$1/comments" \
              -d "$(jq -n '{body:"@copilot A code review with inline comments has been submitted on this PR. Please address ALL unresolved review threads as ONE batch: read every thread first, fix what you accept, reply on each thread (brief rationale if you decline), and resolve the threads you have addressed. Include the Jira key in every commit message."}')" > /dev/null
            jira_comment "$2" "Code review on PR #$1 found $3 comments — fix round dispatched to the coding agent."
            slack ":memo: *$2* — review found *$3* comments on PR #$1. @developer dispatched for the fix round: https://github.com/$REPO/pull/$1"
          }
          go_ready() { # $1=pr $2=key $3=node-id $4=is-draft $5=context-text
            add_label "$1" "ready-for-human"
            [ "$4" = "true" ] && mark_ready "$3"
            jira_comment "$2" "PR #$1 $5 — marked Ready for review. Awaiting human merge. https://github.com/$REPO/pull/$1"
            slack ":white_check_mark: *$2* — PR #$1 $5 and is *ready for your review*, Keval: https://github.com/$REPO/pull/$1"
          }

          # dynamic workflow id of the Copilot coding agent (for "is a session running?" checks)
          SWE_WF_ID=$(gh api "/repos/$REPO/actions/workflows" \
            --jq '.workflows[] | select(.path | startswith("dynamic/copilot-swe-agent")) | .id' | head -1 || true)
          agent_run_after() { # $1=branch $2=ISO-time|'' -> "busy", "done", or "none"
            RUNS=$(gh api "/repos/$REPO/actions/workflows/$SWE_WF_ID/runs?branch=$1&per_page=10" --jq '.workflow_runs' 2>/dev/null || echo '[]')
            if [ "$(echo "$RUNS" | jq '[.[] | select(.status != "completed")] | length')" -gt 0 ]; then echo busy; return; fi
            if [ -z "$2" ]; then
              [ "$(echo "$RUNS" | jq 'length')" -gt 0 ] && echo done || echo none; return
            fi
            NEWER=$(echo "$RUNS" | jq --arg t "$2" '[.[] | select(.status=="completed" and .created_at > $t)] | length')
            [ "$NEWER" -gt 0 ] && echo done || echo none
          }

          # candidate PRs: open PRs authored by the coding agent, or already carrying router labels
          # NOTE: REST reports the coding agent's login as "Copilot" (GraphQL shows copilot-swe-agent) — accept both.
          PRS=$(gh api "/repos/$REPO/pulls?state=open&per_page=50" --jq \
            '[.[] | select((.user.login=="Copilot") or (.user.login=="copilot-swe-agent") or any(.labels[].name; IN("copilot-review-requested","fix-dispatched","ready-for-human"))) | .number] | unique | .[]')
          [ -z "$PRS" ] && { echo "no candidate PRs — nothing to do"; exit 0; }

          for PR in $PRS; do
            DATA=$(gh api "/repos/$REPO/pulls/$PR")
            TITLE=$(echo "$DATA" | jq -r .title)
            BRANCH=$(echo "$DATA" | jq -r .head.ref)
            NODE_ID=$(echo "$DATA" | jq -r .node_id)
            IS_DRAFT=$(echo "$DATA" | jq -r .draft)
            LABELS=$(echo "$DATA" | jq -r '[.labels[].name] | join(",")')
            KEY=$(echo "$TITLE" | grep -oE '[A-Z][A-Z0-9]+-[0-9]+' | head -1 || true)
            echo "── PR #$PR | $TITLE | draft=$IS_DRAFT | labels: [$LABELS]"

            case "$TITLE" in *"[WIP]"*) echo "   [WIP] — agent mid-session, skip"; continue ;; esac

            # last Copilot review on this PR
            LAST=$(gh api "/repos/$REPO/pulls/$PR/reviews" \
              --jq '[.[] | select(.user.login | startswith("copilot-pull-request"))] | last // empty')
            R_ID=""; R_AT=""; R_COUNT=0
            if [ -n "$LAST" ]; then
              R_ID=$(echo "$LAST" | jq -r .id); R_AT=$(echo "$LAST" | jq -r .submitted_at)
              R_COUNT=$(gh api "/repos/$REPO/pulls/$PR/reviews/$R_ID/comments" --jq 'length')
            fi

            case ",$LABELS," in
              *,ready-for-human,*)
                # human-gated. Only a NEWER review (human manually re-requested) re-enters the cycle.
                T=$(label_time "$PR" "ready-for-human")
                if [ -z "$R_AT" ] || [ "$R_AT" \< "$T" ] || [ "$R_AT" = "$T" ]; then echo "   ready-for-human — awaiting human"; continue; fi
                if [ "$R_COUNT" -eq 0 ]; then
                  jira_comment "$KEY" "Manual re-review of PR #$PR came back clean."
                  slack ":white_check_mark: *$KEY* — manual re-review of PR #$PR is clean: https://github.com/$REPO/pull/$PR"
                  # refresh the label timestamp (remove+add) so this review isn't re-routed
                  rm_label "$PR" "ready-for-human"
                  add_label "$PR" "ready-for-human"
                  echo "   manual re-review clean -> pinged"
                else
                  rm_label "$PR" "ready-for-human"
                  dispatch_fix "$PR" "$KEY" "$R_COUNT"
                  echo "   manual re-review found $R_COUNT comments -> cycle restarted (fix dispatched)"
                fi ;;

              *,fix-dispatched,*)
                # fix round dispatched — when the agent's fix session is done, hand to human
                T=$(label_time "$PR" "fix-dispatched")
                case "$(agent_run_after "$BRANCH" "$T")" in
                  busy) echo "   fix session running — skip" ;;
                  none) echo "   fix session not started/finished yet — skip" ;;
                  done)
                    rm_label "$PR" "fix-dispatched"
                    go_ready "$PR" "$KEY" "$NODE_ID" "$IS_DRAFT" "has completed its review-fix round"
                    echo "   fix done -> ready-for-human" ;;
                esac ;;

              *,copilot-review-requested,*)
                # waiting on / routing the initial review
                T=$(label_time "$PR" "copilot-review-requested")
                if [ -z "$R_AT" ] || [ "$R_AT" \< "$T" ]; then echo "   initial review pending — skip"; continue; fi
                rm_label "$PR" "copilot-review-requested"
                if [ "$R_COUNT" -eq 0 ]; then
                  go_ready "$PR" "$KEY" "$NODE_ID" "$IS_DRAFT" "passed code review clean"
                  echo "   clean review -> ready-for-human"
                else
                  dispatch_fix "$PR" "$KEY" "$R_COUNT"
                  echo "   $R_COUNT comments -> fix round dispatched"
                fi ;;

              *)
                # fresh agent PR — request the initial review once no agent session is active
                [ -z "$KEY" ] && echo "::warning::PR #$PR has no Jira key"
                case "$(agent_run_after "$BRANCH" "")" in
                  busy) echo "   agent session running — skip" ;;
                  *)
                    add_label "$PR" "copilot-review-requested"
                    request_review "$PR"
                    jira_comment "$KEY" "Code review requested on PR #$PR."
                    slack ":eyes: *$KEY* — code review requested on PR #$PR: https://github.com/$REPO/pull/$PR"
                    echo "   initial review requested" ;;
                esac ;;
            esac
          done
