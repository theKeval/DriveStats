name: Review router

# Agentic-workflow Phase 5: orchestrates the @seniorDev (Copilot code review) loop.
#  - Requests Copilot review when @dev finishes (it review-requests the human) or PR marked ready
#  - On Copilot review submitted: dispatch ONE batched @copilot fix request (round cap = 1)
#    or, if clean, hand to the human for merge (C2)
#  - After the fix push: re-request Copilot reviewer once (C3)
# Master lives in agentic-workflow repo (github/workflows/review-router.yml).

on:
  pull_request:
    types: [review_requested, ready_for_review, synchronize]
  pull_request_review:
    types: [submitted]

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: review-router-${{ github.event.pull_request.number }}
  cancel-in-progress: false

env:
  PR: ${{ github.event.pull_request.number }}
  REPO: ${{ github.repository }}
  GH_TOKEN: ${{ github.token }}
  AGENT_PAT: ${{ secrets.AGENT_PAT }}
  JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
  JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
  JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
  SLACK_WEBHOOK_SENIORDEV: ${{ secrets.SLACK_WEBHOOK_SENIORDEV }}

jobs:
  # ---- 1. Kick off the Copilot review when @dev finishes ----
  request-review:
    if: >
      github.event.pull_request.user.login == 'copilot-swe-agent[bot]' || github.event.pull_request.user.login == 'copilot-swe-agent'
    runs-on: ubuntu-latest
    steps:
      - name: Request Copilot reviewer (once)
        run: |
          EVT="${{ github.event.action }}"
          REQ="${{ github.event.requested_reviewer.login }}"
          LABELS=$(gh api "/repos/$REPO/issues/$PR/labels" --jq '[.[].name] | join(",")')

          case "$EVT" in
            review_requested)
              # agent-finished signal = it requests review from a human; ignore our own Copilot request
              case "$REQ" in Copilot|copilot-pull-request-reviewer*) exit 0 ;; esac
              case "$LABELS" in
                *re-review-requested*) exit 0 ;;
                *review-round-1*) MODE="re-review" ;;   # fix session finished (C3)
                *copilot-review-requested*) exit 0 ;;
                *) MODE="initial" ;;
              esac ;;
            ready_for_review)
              case "$LABELS" in *copilot-review-requested*) exit 0 ;; esac
              MODE="initial" ;;
            synchronize)
              # fallback: fix push after round-1 dispatch -> single re-review (C3)
              SENDER="${{ github.event.sender.login }}"
              case "$SENDER" in copilot-swe-agent*|Copilot) ;; *) exit 0 ;; esac
              case "$LABELS" in *review-round-1*) ;; *) exit 0 ;; esac
              case "$LABELS" in *re-review-requested*) exit 0 ;; esac
              MODE="re-review" ;;
          esac

          if [ "$MODE" = "initial" ]; then
            gh api -X POST "/repos/$REPO/issues/$PR/labels" -f "labels[]=copilot-review-requested" > /dev/null
          else
            gh api -X POST "/repos/$REPO/issues/$PR/labels" -f "labels[]=re-review-requested" > /dev/null
          fi
          curl -sf -H "Authorization: Bearer $AGENT_PAT" -H "Accept: application/vnd.github+json" \
            -X POST "https://api.github.com/repos/$REPO/pulls/$PR/requested_reviewers" \
            -d '{"reviewers":["copilot-pull-request-reviewer[bot]"]}' > /dev/null
          echo "Copilot review requested ($MODE) on PR #$PR"

  # ---- 2. Route the submitted Copilot review ----
  route-review:
    if: github.event_name == 'pull_request_review'
    runs-on: ubuntu-latest
    steps:
      - name: Route
        run: |
          AUTHOR="${{ github.event.review.user.login }}"
          case "$AUTHOR" in copilot-pull-request-reviewer*) ;; *) echo "not a Copilot review ($AUTHOR) — skip"; exit 0 ;; esac

          REVIEW_ID="${{ github.event.review.id }}"
          TITLE=$(jq -r .pull_request.title "$GITHUB_EVENT_PATH")
          KEY=$(echo "$TITLE" | grep -oE '[A-Z][A-Z0-9]+-[0-9]+' | head -1 || true)
          COUNT=$(gh api "/repos/$REPO/pulls/$PR/reviews/$REVIEW_ID/comments" --jq 'length')
          LABELS=$(gh api "/repos/$REPO/issues/$PR/labels" --jq '[.[].name] | join(",")')
          echo "review $REVIEW_ID by $AUTHOR: $COUNT inline comments; labels: $LABELS; jira: $KEY"

          jira_comment() {
            [ -z "$KEY" ] && return 0
            jq -n --arg t "$1" '{body:{type:"doc",version:1,content:[{type:"paragraph",content:[{type:"text",text:$t}]}]}}' \
            | curl -sf -u "$JIRA_EMAIL:$JIRA_API_TOKEN" -H "Content-Type: application/json" -X POST \
                "$JIRA_BASE_URL/rest/api/3/issue/$KEY/comment" -d @- > /dev/null
          }
          slack() {
            curl -sf -X POST -H "Content-Type: application/json" -d "$(jq -n --arg t "$1" '{text:$t}')" "$SLACK_WEBHOOK_SENIORDEV" > /dev/null
          }

          if [ "$COUNT" -eq 0 ]; then
            # ---- clean review (C2): human merges ----
            jira_comment "Code review clean on PR #$PR — awaiting human merge. https://github.com/$REPO/pull/$PR"
            slack ":white_check_mark: *$KEY* review clean on PR #$PR — ready for your merge, Keval: https://github.com/$REPO/pull/$PR"
            exit 0
          fi

          case "$LABELS" in
            *review-round-1*)
              # ---- cap reached (C3): escalate ----
              jira_comment "Re-review of PR #$PR still has $COUNT comments after the fix round (cap=1). Escalating to human."
              slack ":rotating_light: *$KEY* — PR #$PR still has *$COUNT* review comments after the fix round. Human intervention needed: https://github.com/$REPO/pull/$PR"
              ;;
            *)
              # ---- round 1: single batched dispatch to @dev (C1) ----
              gh api -X POST "/repos/$REPO/issues/$PR/labels" -f "labels[]=review-round-1" > /dev/null
              curl -sf -H "Authorization: Bearer $AGENT_PAT" -H "Accept: application/vnd.github+json" \
                -X POST "https://api.github.com/repos/$REPO/issues/$PR/comments" \
                -d "$(jq -n '{body:"@copilot A code review with multiple comments has been submitted on this PR. Please address ALL unresolved review threads as ONE batch: read every thread first, fix what you accept, and reply with a brief rationale on any you decline. Include the Jira key in every commit message."}')" > /dev/null
              jira_comment "Code review on PR #$PR found $COUNT comments — fix round 1 of 1 dispatched to the coding agent."
              slack ":memo: *$KEY* — review found *$COUNT* comments on PR #$PR. @developer dispatched for the (single) fix round: https://github.com/$REPO/pull/$PR"
              ;;
          esac
