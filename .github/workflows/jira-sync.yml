name: Jira sync

# Agentic-workflow: mirrors GitHub activity onto the Jira ticket named in the
# issue/PR title (e.g. "DRIVE-6: ..."). Installed from agentic-workflow repo —
# edit the master there (github/workflows/jira-sync.yml) and re-sync.

on:
  issues:
    types: [assigned]
  pull_request:
    types: [opened, ready_for_review, closed]
  workflow_dispatch:
    inputs:
      simulate:
        description: "Event to simulate (pr_opened | pr_merged | issue_assigned)"
        required: true
      number:
        description: "Issue/PR number to run against"
        required: true

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: jira-sync-${{ github.event.issue.number || github.event.pull_request.number || github.event.inputs.number }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      SLACK_WEBHOOK_DEV: ${{ secrets.SLACK_WEBHOOK_DEV }}
      SLACK_WEBHOOK_PM: ${{ secrets.SLACK_WEBHOOK_PM }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Classify event
        id: ev
        run: |
          EVT="${{ github.event_name }}"
          SIM="${{ github.event.inputs.simulate }}"
          if [ "$EVT" = "workflow_dispatch" ]; then
            KIND="$SIM"
            NUM="${{ github.event.inputs.number }}"
            case "$KIND" in
              issue_assigned) TITLE=$(gh api "/repos/${{ github.repository }}/issues/$NUM" --jq .title) ;;
              *)              TITLE=$(gh api "/repos/${{ github.repository }}/pulls/$NUM" --jq .title) ;;
            esac
          elif [ "$EVT" = "issues" ]; then
            # only react when the Copilot agent is the new assignee
            LOGIN="${{ github.event.assignee.login }}"
            case "$LOGIN" in
              copilot-swe-agent|Copilot) KIND="issue_assigned" ;;
              *) KIND="skip" ;;
            esac
            NUM="${{ github.event.issue.number }}"
            TITLE=$(jq -r .issue.title "$GITHUB_EVENT_PATH")
          else
            ACTION="${{ github.event.action }}"
            NUM="${{ github.event.pull_request.number }}"
            TITLE=$(jq -r .pull_request.title "$GITHUB_EVENT_PATH")
            MERGED="${{ github.event.pull_request.merged }}"
            case "$ACTION" in
              opened|ready_for_review) KIND="pr_opened" ;;
              closed) [ "$MERGED" = "true" ] && KIND="pr_merged" || KIND="skip" ;;
            esac
          fi
          echo "kind=$KIND" >> "$GITHUB_OUTPUT"
          echo "num=$NUM" >> "$GITHUB_OUTPUT"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"

      - name: Extract & validate Jira key (C8)
        id: key
        if: steps.ev.outputs.kind != 'skip'
        run: |
          TITLE='${{ steps.ev.outputs.title }}'
          KEY=$(echo "$TITLE" | grep -oE '[A-Z][A-Z0-9]+-[0-9]+' | head -1 || true)
          if [ -z "$KEY" ]; then
            echo "::warning::No Jira key in title: $TITLE"
            gh api -X POST "/repos/${{ github.repository }}/issues/${{ steps.ev.outputs.num }}/comments" \
              -f body=":warning: **Jira sync skipped** — no Jira key (e.g. \`DRIVE-12\`) found in the title. Please add it so the ticket can be updated." > /dev/null
            echo "key=" >> "$GITHUB_OUTPUT"
          else
            echo "key=$KEY" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync to Jira + Slack
        if: steps.ev.outputs.kind != 'skip' && steps.key.outputs.key != ''
        run: |
          KEY="${{ steps.key.outputs.key }}"
          KIND="${{ steps.ev.outputs.kind }}"
          NUM="${{ steps.ev.outputs.num }}"
          REPO="${{ github.repository }}"
          AUTH="$JIRA_EMAIL:$JIRA_API_TOKEN"
          B="$JIRA_BASE_URL"

          # current status for idempotency guard (C6)
          STATUS=$(curl -sf -u "$AUTH" "$B/rest/api/3/issue/$KEY?fields=status" | jq -r .fields.status.name)
          echo "Ticket $KEY current status: $STATUS"

          jira_comment() {  # $1 = text
            jq -n --arg t "$1" '{body:{type:"doc",version:1,content:[{type:"paragraph",content:[{type:"text",text:$t}]}]}}' \
            | curl -sf -u "$AUTH" -H "Content-Type: application/json" -X POST \
                "$B/rest/api/3/issue/$KEY/comment" -d @- > /dev/null
          }
          jira_transition() {  # $1 = transition id, $2 = target status name (skip if already there)
            [ "$STATUS" = "$2" ] && { echo "already $2 — skip transition"; return 0; }
            curl -sf -u "$AUTH" -H "Content-Type: application/json" -X POST \
              "$B/rest/api/3/issue/$KEY/transitions" -d "{\"transition\":{\"id\":\"$1\"}}"
            echo "transitioned $KEY -> $2"
          }
          slack() {  # $1 = webhook url, $2 = text
            curl -sf -X POST -H "Content-Type: application/json" -d "$(jq -n --arg t "$2" '{text:$t}')" "$1" > /dev/null
          }

          case "$KIND" in
            issue_assigned)
              jira_comment "Implementation started: GitHub issue #$NUM assigned to the coding agent. https://github.com/$REPO/issues/$NUM"
              jira_transition 21 "In Progress"
              slack "$SLACK_WEBHOOK_DEV" ":hammer_and_wrench: Started implementation of *$KEY* (issue #$NUM) — https://github.com/$REPO/issues/$NUM"
              ;;
            pr_opened)
              jira_comment "Pull request opened for this ticket: https://github.com/$REPO/pull/$NUM — moving to review."
              jira_transition 31 "In Review"
              slack "$SLACK_WEBHOOK_DEV" ":mag: *$KEY* implementation ready — PR #$NUM open for review: https://github.com/$REPO/pull/$NUM"
              ;;
            pr_merged)
              jira_comment "Pull request #$NUM merged. Work complete. https://github.com/$REPO/pull/$NUM"
              jira_transition 41 "Done"
              slack "$SLACK_WEBHOOK_PM" ":white_check_mark: *$KEY* is DONE — PR #$NUM merged: https://github.com/$REPO/pull/$NUM"
              ;;
          esac
